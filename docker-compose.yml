version: '3.8'
services:
  db:
    image: postgres:15
    container_name: bdh_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: bdh_redis
    restart: always
    ports:
      - "6379:6379"
volumes:
  pgdata:
